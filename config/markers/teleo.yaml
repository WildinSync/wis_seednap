# Seednap Pipeline Configuration for Teleo Marker
# Configuration format version
version: "0.1.0"

# Marker-specific configuration
marker:
  name: "teleo"
  description: "Teleost fish eDNA metabarcoding using 12S rRNA"
  primers:
    forward: "ACACCGCCCGTCACTCT"
    reverse: "CTTCCGGTACACTTACCATG"
    name: "Teleo"
    target: "12S rRNA"
    amplicon_length: [40, 100]

# File paths configuration
paths:
  raw_data: "/home/shared/edna/raw/fw_na_namibia/Teleo/raw_for_dada2/"
  output: "outputs"
  logs: "logs"
  references: "/home/shared/edna/reference_database/2025/teleo/"

# Demultiplexing configuration
demultiplex:
  enabled: true
  protocol: "ligation"  # Options: "ligation", "standard", "none"
  metadata: "/home/shared/edna/raw/fw_na_namibia/metadata/metadata_lab_fw_na_namibia_2023.csv"  # Uncomment if using demultiplexing

# Primer trimming configuration (cutadapt)
trimming:
  tool: "cutadapt"
  min_length: 20
  max_error_rate: 0.1
  cores: 12
  discard_untrimmed: true
  overlap: 3

# SWARM
swarm:
  merge:
    fastq_maxdiffs: 10    # Max differences in overlap region
    fastq_minovlen: 10    # Min overlap length
    allow_stagger: false  # Allow staggered read merging
  clustering:
    d: 1                  # Distance threshold
    fastidious: true      # Refine singletons
    boundary: 3           # Min mass for large OTUs (fastidious)
    threads: 4            # CPU threads
  chimera:
    method: "denovo"      # "denovo" or "none"
  min_sequence_length: 20 # Min sequence length after merging


# DADA2 processing configuration
dada2:
  filter:
    max_ee: 2.0
    trunc_q: 11
    max_n: 0
    rm_phix: true
    # min_len: 100  # Optional: minimum read length
    # max_len: 200  # Optional: maximum read length
  merge:
    min_overlap: 20
    max_mismatch: 0
  chimera:
    method: "consensus"  # Options: "consensus", "pooled", "none"
  pool: false
  multithread: true

# Taxonomic assignment configuration
taxonomy:
  method: "blast"  # Options: "dada2", "decipher", "ecotag", "blast"

  # Marker-level contaminant list applied regardless of method.
  # Flagged in `is_contaminant_candidate` column; never deleted from output.
  # See Whitmore et al. 2023 (Nat. Ecol. Evol.) on human genetic bycatch.
  contaminants:
    - "Homo_sapiens"
    - "Bos_taurus"
    - "Sus_scrofa"
    - "Canis_lupus_familiaris"
    - "Canis_familiaris"
    - "Felis_catus"
    - "Mus_musculus"
    - "Gallus_gallus"
    - "Ovis_aries"

  # Database paths for each method
  databases:
    # DADA2 taxonomic assignment (RDP naive Bayesian classifier)
    dada2:
      all: "/home/shared/edna/reference_database/2025/teleo/CRABS_MITOFISH_MIDORI2_GB265_teleo_dada2_all.fasta"
      species: "/home/shared/edna/reference_database/2025/teleo/CRABS_MITOFISH_MIDORI2_GB265_teleo_dada2_species.fasta"
      # RDP bootstrap threshold for short rRNA reads (Wang 2007). Below this
      # confidence the rank is nulled and every finer rank is cascaded.
      bootstrap_threshold: 80

    # BLAST + LCA taxonomic assignment
    blast:
      fasta: "/home/shared/edna/reference_database/2025/teleo/CRABS_MITOFISH_MIDORI2_GB265_teleo_blast.fasta"
      # blastn task. 'megablast' (word_size 28) is fastest and right for short,
      # high-identity vertebrate amplicons. Switch to 'blastn' for divergent refs.
      task: "megablast"
      perc_identity: 80.0
      qcov_hsp_perc: 80.0
      evalue: 1.0e-10
      max_target_seqs: 10
      # Cascade rank-floor thresholds (percent identity). Below threshold for rank R,
      # R and every finer rank are nulled in the output. Defaults follow Pappalardo 2025
      # (Methods Ecol. Evol.) common-default series with rRNA-marker family tightening.
      threshold_species: 99.0
      threshold_genus: 96.0
      threshold_family: 90.0
      threshold_order: 80.0
      threshold_class: 70.0
      # MEGAN-LR style LCA: include hits within this percent of the best bitscore for
      # LCA collapse. 0 = exact ties only. Default 10.0 follows MEGAN's `topPercent`.
      top_bitscore_pct: 10.0
      lca_pident_delta: 1.0      # in-band hits must be within this %id of the best (eDNAFlow "diff 1"); stops a near-identity off-target collapsing the LCA
      lca_algorithm: cascade   # cascade (current) | collapsed_taxonomy/fishbase_tiered (taxid-based, need a taxid-mapped DB + taxdump)

    # Ecotag (OBITools) taxonomic assignment
    ecotag:
      tree: "/home/shared/edna/reference_database/2023_06/teleo_custom_embl/customtaxonomy/"
      fasta: "/home/shared/edna/reference_database/2023_06/teleo_custom_embl/db_teleo_custom_and_embl.fasta"

    # DECIPHER taxonomic assignment (no longer maintained)
    decipher:
      trained: "/home/shared/edna/reference_database/decipher/teleo_trained.rds"

# Export configuration
export:
  formats:
    - "csv"
  gbif:
    enabled: true
    add_rank: true
    add_taxon: true

# Quality control metrics configuration
metrics:
  generate_plots: true
  plot_format: "png"  # Options: "png", "pdf", "svg"
  metrics:
    - "read_counts"
    - "quality_scores"
    - "length_distribution"

# Run reporting: per-step read/sequence tracking + HTML report (both on by default)
report:
  read_tracking: true        # per-step read/sequence tracking table + data-loss warnings (default: on)
  html_report: true          # self-contained HTML run report with charts (default: on; set false to disable)
  warn_below_retention_pct: 30.0   # warn for samples retaining < this % of raw reads (raw -> final)
  warn_step_loss_pct: 70.0         # warn when a single step drops more than this % of a sample's reads
  # Where report artifacts are written. Defaults to "<output>/04_report/<marker>";
  # uncomment to store them elsewhere (a per-marker subdirectory is created inside):
  # output_dir: "/path/to/reports"
  # Optional dataset metadata for the report's "Dataset & provenance" section
  # (sampling location, dates, sites, institution, sequencing, reference DB):
  # sample_metadata: "/path/to/metadata_field_<dataset>.csv"
  # project_metadata: "/path/to/metadata_proj_<dataset>.csv"

# Logging configuration
logging:
  level: "INFO"  # Options: "DEBUG", "INFO", "WARNING", "ERROR"
  format: "detailed"  # Options: "simple", "detailed", "json"
  file: true
  console: true

# Pipeline execution steps
pipeline:
  steps:
    - "trim"
    - "swarm"
    - "taxonomy"
  skip: []  # List steps to skip, e.g., ["trim"] if data is already trimmed
