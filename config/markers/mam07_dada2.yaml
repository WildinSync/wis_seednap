version: "0.1.0"

marker:
  name: "mam07_dada2"
  description: "Mammal eDNA metabarcoding using MamP007 16S rRNA"
  primers:
    forward: "CGAGAAGACCCTATGGAGCT"
    reverse: "CCGAGGTCRCCCCAACC"
    name: "MamP007"
    target: "16S rRNA"
    amplicon_length: [50, 120]

paths:
  raw_data: "/home/shared/edna/raw/fw_ch_greina_2025/mam07/"
  output: "outputs_test/mam07_dada2"
  logs: "logs"
  references: "/home/shared/edna/reference_database/2025/mamm07/"

demultiplex:
  enabled: false
  protocol: "none"

trimming:
  tool: "cutadapt"
  min_length: 20
  max_error_rate: 0.1
  cores: 12
  discard_untrimmed: true
  overlap: 3

swarm:
  merge:
    fastq_maxdiffs: 10
    fastq_minovlen: 10
    allow_stagger: false
  clustering:
    d: 1
    fastidious: true
    boundary: 3
    threads: 4
  chimera:
    method: "denovo"
  min_sequence_length: 20

dada2:
  filter:
    max_ee: 2.0
    trunc_q: 11
    max_n: 0
    rm_phix: true
  merge:
    min_overlap: 20
    max_mismatch: 0
  chimera:
    method: "consensus"
  pool: false
  multithread: true

taxonomy:
  method: "dada2"
  contaminants:
    - "Homo_sapiens"
    - "Bos_taurus"
    - "Sus_scrofa"
    - "Canis_lupus_familiaris"
    - "Canis_familiaris"
    - "Felis_catus"
    - "Mus_musculus"
    - "Gallus_gallus"
    - "Ovis_aries"
  databases:
    dada2:
      all: "/home/shared/edna/reference_database/2025/mamm07/CRABS_MIDORI2_GB265_mamm07_dada2_all.fasta"
      species: "/home/shared/edna/reference_database/2025/mamm07/CRABS_MIDORI2_GB265_mamm07_dada2_species.fasta"
      bootstrap_threshold: 80
    blast:
      fasta: "/home/shared/edna/reference_database/2025/mamm07/CRABS_MIDORI2_GB265_mamm07_blast.fasta"
      task: "megablast"
      perc_identity: 80.0
      qcov_hsp_perc: 80.0
      evalue: 1.0e-10
      max_target_seqs: 10
      threshold_species: 99.0
      threshold_genus: 96.0
      threshold_family: 90.0
      threshold_order: 80.0
      threshold_class: 70.0
      top_bitscore_pct: 10.0

export:
  formats:
    - "csv"
  gbif:
    enabled: false
    add_rank: true
    add_taxon: true

metrics:
  generate_plots: false
  plot_format: "png"
  metrics:
    - "read_counts"

report:
  read_tracking: true        # write outputs/04_report/<marker>/read_tracking.{csv,txt} + data-loss warnings
  html_report: false         # also generate a self-contained HTML run report with charts (opt-in)
  warn_below_retention_pct: 30.0   # warn for samples retaining < this % of raw reads (raw -> final)
  warn_step_loss_pct: 70.0         # warn when a single step drops more than this % of a sample's reads
  # Optional dataset metadata for the report's "Dataset & provenance" section
  # (sampling location, dates, sites, institution, sequencing, reference DB):
  # sample_metadata: "/path/to/metadata_field_<dataset>.csv"
  # project_metadata: "/path/to/metadata_proj_<dataset>.csv"

logging:
  level: "INFO"
  format: "detailed"
  file: true
  console: true

pipeline:
  steps:
    - "trim"
    - "dada2"
    - "taxonomy"
  skip: []
