version: "0.1.0"

marker:
  name: "teleo_rhone"
  description: "Teleost fish eDNA metabarcoding using Teleo 12S rRNA - Rhone 2025"
  primers:
    forward: "ACACCGCCCGTCACTCT"
    reverse: "CTTCCGGTACACTTACCATG"
    name: "Teleo"
    target: "12S rRNA"
    amplicon_length: [40, 100]

paths:
  raw_data: "/home/shared/edna/raw/fw_ch_rhone_2025/teleo/"
  output: "outputs_test/teleo_rhone"
  logs: "logs"
  references: "/home/shared/edna/reference_database/2025/teleo/"

demultiplex:
  enabled: false
  protocol: "none"

trimming:
  tool: "cutadapt"
  min_length: 20
  max_error_rate: 0.1
  cores: 12
  discard_untrimmed: true
  overlap: 3

swarm:
  merge:
    fastq_maxdiffs: 10
    fastq_minovlen: 10
    allow_stagger: false
  clustering:
    d: 1
    fastidious: true
    boundary: 3
    threads: 4
  chimera:
    method: "denovo"
  min_sequence_length: 20

dada2:
  filter:
    max_ee: 2.0
    trunc_q: 11
    max_n: 0
    rm_phix: true
  merge:
    min_overlap: 20
    max_mismatch: 0
  chimera:
    method: "consensus"
  pool: false
  multithread: true
  per_library: false      # learn DADA2 errors per library/run then merge (only matters when >=2 libraries are pooled)

taxonomy:
  method: "blast"
  contaminants:
    - "Homo_sapiens"
    - "Bos_taurus"
    - "Sus_scrofa"
    - "Canis_lupus_familiaris"
    - "Canis_familiaris"
    - "Felis_catus"
    - "Mus_musculus"
    - "Gallus_gallus"
    - "Ovis_aries"
  databases:
    blast:
      fasta: "/home/shared/edna/reference_database/2025/teleo/CRABS_MITOFISH_MIDORI2_GB265_teleo_blast.fasta"
      task: "megablast"
      perc_identity: 80.0
      qcov_hsp_perc: 80.0
      evalue: 1.0e-10
      max_target_seqs: 10
      threshold_species: 99.0
      threshold_genus: 96.0
      threshold_family: 90.0
      threshold_order: 80.0
      threshold_class: 70.0
      top_bitscore_pct: 10.0
      lca_pident_delta: 1.0      # in-band hits must be within this %id of the best (eDNAFlow "diff 1"); stops a near-identity off-target collapsing the LCA
      lca_algorithm: cascade   # cascade (per-rank thresholds, current default) | collapsed_taxonomy (eDNAFlow/OceanOmics %id-window LCA on the FASTA-header lineage; header-based, no taxids/taxdump, runs offline)
      lca_pid: 90.0            # collapsed_taxonomy only: hard %identity floor; hits below this are dropped before the LCA (query coverage is enforced upstream at the blastn step via qcov_hsp_perc)
      lca_diff: 1.0            # collapsed_taxonomy only: identity window; hits within this %id of the best survivor are collapsed to their lowest common ancestor

export:
  formats:
    - "csv"
  gbif:
    enabled: false
    add_rank: true
    add_taxon: true

metrics:
  generate_plots: false
  plot_format: "png"
  metrics:
    - "read_counts"

report:
  read_tracking: true        # per-step read/sequence tracking table + data-loss warnings (default: on)
  html_report: true          # self-contained HTML run report with charts (default: on; set false to disable)
  warn_below_retention_pct: 30.0   # warn for samples retaining < this % of raw reads (raw -> final)
  warn_step_loss_pct: 70.0         # warn when a single step drops more than this % of a sample's reads
  # Where report artifacts are written. Defaults to "<output>/04_report/<marker>";
  # uncomment to store them elsewhere (a per-marker subdirectory is created inside):
  # output_dir: "/path/to/reports"
  # Optional dataset metadata for the report's "Dataset & provenance" section
  # (sampling location, dates, sites, institution, sequencing, reference DB):
  # sample_metadata: "/path/to/metadata_field_<dataset>.csv"
  # project_metadata: "/path/to/metadata_proj_<dataset>.csv"

logging:
  level: "INFO"
  format: "detailed"
  file: true
  console: true

pipeline:
  steps:
    - "trim"
    - "swarm"
    - "taxonomy"
  skip: []
