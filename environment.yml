name: seednap
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  # Python
  - python=3.9

  # External bioinformatics tools (pinned to validated versions; see
  # outputs_test/VALIDATION_REPORT.md for the test runs that confirmed these)
  - cutadapt=5.2
  - blast=2.17.0
  - vsearch=2.30.5
  - swarm=3.1.6

  # R and R packages (pinned to validated versions; the DADA2/DECIPHER
  # versions produce the biology results, so leaving them unpinned risks
  # silent output drift across environment rebuilds)
  - r-base=4.2
  - r-tidyverse=2.0.0
  - r-patchwork=1.2.0
  - bioconductor-biostrings=2.66.0
  - bioconductor-dada2=1.26.0
  - bioconductor-decipher=2.26.0

  # Python scientific stack (conda packages)
  - pandas>=2.2  # BLAST LCA uses DataFrameGroupBy.apply(include_groups=...)
  - numpy>=1.24
  - biopython>=1.80
  - pyyaml>=6.0
  - matplotlib>=3.5  # charts for the optional HTML run report

  # Python CLI and utilities (conda packages)
  - click>=8.0
  - rich>=13.0
  - jinja2>=3.0

  # Development tools (conda packages)
  - pytest>=7.4
  - pytest-cov>=4.1
  - black>=23.0
  - mypy>=1.5

  # Install via pip (packages not available or better via pip)
  - pip
  - pip:
    - pydantic>=2.0
    - python-dotenv>=1.0  # loads NCBI Entrez API key from .env at runtime
    - pytest-mock>=3.11
    - ruff>=0.1
    - pre-commit>=3.0
    - types-PyYAML>=6.0
    - -e .  # Install seednap package in development mode
