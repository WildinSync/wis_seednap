name: seednap
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  # Python
  - python=3.9

  # External bioinformatics tools
  - cutadapt>=4.0
  - blast>=2.12

  # R and R packages
  - r-base=4.2
  - r-tidyverse
  - r-patchwork
  - bioconductor-biostrings
  - bioconductor-dada2
  - bioconductor-decipher

  # Python scientific stack (conda packages)
  - pandas>=2.0
  - numpy>=1.24
  - biopython>=1.80
  - pyyaml>=6.0

  # Python CLI and utilities (conda packages)
  - click>=8.0
  - rich>=13.0
  - jinja2>=3.0

  # Development tools (conda packages)
  - pytest>=7.4
  - pytest-cov>=4.1
  - black>=23.0
  - mypy>=1.5

  # Install via pip (packages not available or better via pip)
  - pip
  - pip:
    - pydantic>=2.0
    - pytest-mock>=3.11
    - ruff>=0.1
    - pre-commit>=3.0
    - types-PyYAML>=6.0
    - -e .  # Install seednap package in development mode
