<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 662" width="100%" font-family="'SFMono-Regular','SF Mono','Menlo','Consolas','Liberation Mono','DejaVu Sans Mono',monospace">
  <rect x="0.5" y="0.5" width="879" height="661" rx="11" fill="#0D1117" stroke="#30363d" stroke-width="1"/>
  <path d="M 0 11 a 11 11 0 0 1 11 -11 h 858 a 11 11 0 0 1 11 11 v 31 h -880 z" fill="#161B22"/>
  <line x1="0" y1="42" x2="880" y2="42" stroke="#30363d" stroke-width="1"/>
  <circle cx="22" cy="21" r="6" fill="#ff5f56"/>
  <circle cx="42" cy="21" r="6" fill="#febc2e"/>
  <circle cx="62" cy="21" r="6" fill="#27c93f"/>
  <text x="440" y="25" text-anchor="middle" font-size="12.5" fill="#7d8590" letter-spacing="1">seednap</text>
    <text x="26" y="70" font-family="'SFMono-Regular','SF Mono','Menlo','Consolas','Liberation Mono','DejaVu Sans Mono',monospace" font-size="11.5" letter-spacing="1.5" fill="#3fb950" font-weight="bold">RUN THE PIPELINE</text>
  <text x="26" y="92" font-family="'SFMono-Regular','SF Mono','Menlo','Consolas','Liberation Mono','DejaVu Sans Mono',monospace" font-size="13.5" xml:space="preserve"><tspan fill="#00C853">$ </tspan><tspan fill="#e6edf3" font-weight="bold">seednap </tspan><tspan fill="#7ee787">run-pipeline</tspan><tspan fill="#8b949e"> config.yaml</tspan></text>
  <text x="430" y="92" font-family="'SFMono-Regular','SF Mono','Menlo','Consolas','Liberation Mono','DejaVu Sans Mono',monospace" font-size="13" fill="#6e7681" xml:space="preserve"># full pipeline from a YAML config</text>
  <text x="26" y="115" font-family="'SFMono-Regular','SF Mono','Menlo','Consolas','Liberation Mono','DejaVu Sans Mono',monospace" font-size="13.5" xml:space="preserve"><tspan fill="#00C853">$ </tspan><tspan fill="#e6edf3" font-weight="bold">seednap </tspan><tspan fill="#7ee787">init</tspan><tspan fill="#8b949e"></tspan></text>
  <text x="430" y="115" font-family="'SFMono-Regular','SF Mono','Menlo','Consolas','Liberation Mono','DejaVu Sans Mono',monospace" font-size="13" fill="#6e7681" xml:space="preserve"># generate an example config</text>
  <text x="26" y="138" font-family="'SFMono-Regular','SF Mono','Menlo','Consolas','Liberation Mono','DejaVu Sans Mono',monospace" font-size="13.5" xml:space="preserve"><tspan fill="#00C853">$ </tspan><tspan fill="#e6edf3" font-weight="bold">seednap </tspan><tspan fill="#7ee787">validate</tspan><tspan fill="#8b949e"> config.yaml</tspan></text>
  <text x="430" y="138" font-family="'SFMono-Regular','SF Mono','Menlo','Consolas','Liberation Mono','DejaVu Sans Mono',monospace" font-size="13" fill="#6e7681" xml:space="preserve"># schema check + preflight</text>
  <text x="26" y="171" font-family="'SFMono-Regular','SF Mono','Menlo','Consolas','Liberation Mono','DejaVu Sans Mono',monospace" font-size="11.5" letter-spacing="1.5" fill="#3fb950" font-weight="bold">INDIVIDUAL STAGES</text>
  <text x="26" y="193" font-family="'SFMono-Regular','SF Mono','Menlo','Consolas','Liberation Mono','DejaVu Sans Mono',monospace" font-size="13.5" xml:space="preserve"><tspan fill="#00C853">$ </tspan><tspan fill="#e6edf3" font-weight="bold">seednap </tspan><tspan fill="#7ee787">trim</tspan><tspan fill="#8b949e"> INPUT_DIR</tspan></text>
  <text x="430" y="193" font-family="'SFMono-Regular','SF Mono','Menlo','Consolas','Liberation Mono','DejaVu Sans Mono',monospace" font-size="13" fill="#6e7681" xml:space="preserve"># primer trimming (Cutadapt)</text>
  <text x="26" y="216" font-family="'SFMono-Regular','SF Mono','Menlo','Consolas','Liberation Mono','DejaVu Sans Mono',monospace" font-size="13.5" xml:space="preserve"><tspan fill="#00C853">$ </tspan><tspan fill="#e6edf3" font-weight="bold">seednap </tspan><tspan fill="#7ee787">swarm</tspan><tspan fill="#8b949e"> MARKER READS_DIR</tspan></text>
  <text x="430" y="216" font-family="'SFMono-Regular','SF Mono','Menlo','Consolas','Liberation Mono','DejaVu Sans Mono',monospace" font-size="13" fill="#6e7681" xml:space="preserve"># SWARM OTU clustering</text>
  <text x="26" y="239" font-family="'SFMono-Regular','SF Mono','Menlo','Consolas','Liberation Mono','DejaVu Sans Mono',monospace" font-size="13.5" xml:space="preserve"><tspan fill="#00C853">$ </tspan><tspan fill="#e6edf3" font-weight="bold">seednap </tspan><tspan fill="#7ee787">dada2</tspan><tspan fill="#8b949e"> MARKER READS_DIR</tspan></text>
  <text x="430" y="239" font-family="'SFMono-Regular','SF Mono','Menlo','Consolas','Liberation Mono','DejaVu Sans Mono',monospace" font-size="13" fill="#6e7681" xml:space="preserve"># DADA2 ASV denoising</text>
  <text x="26" y="262" font-family="'SFMono-Regular','SF Mono','Menlo','Consolas','Liberation Mono','DejaVu Sans Mono',monospace" font-size="13.5" xml:space="preserve"><tspan fill="#00C853">$ </tspan><tspan fill="#e6edf3" font-weight="bold">seednap </tspan><tspan fill="#7ee787">blast</tspan><tspan fill="#8b949e"> QUERY REF COUNTS</tspan></text>
  <text x="430" y="262" font-family="'SFMono-Regular','SF Mono','Menlo','Consolas','Liberation Mono','DejaVu Sans Mono',monospace" font-size="13" fill="#6e7681" xml:space="preserve"># BLAST + LCA assignment</text>
  <text x="26" y="285" font-family="'SFMono-Regular','SF Mono','Menlo','Consolas','Liberation Mono','DejaVu Sans Mono',monospace" font-size="13.5" xml:space="preserve"><tspan fill="#00C853">$ </tspan><tspan fill="#e6edf3" font-weight="bold">seednap </tspan><tspan fill="#7ee787">assign-taxonomy</tspan><tspan fill="#8b949e"> METHOD ...</tspan></text>
  <text x="430" y="285" font-family="'SFMono-Regular','SF Mono','Menlo','Consolas','Liberation Mono','DejaVu Sans Mono',monospace" font-size="13" fill="#6e7681" xml:space="preserve"># blast | dada2 | decipher | ecotag</text>
  <text x="26" y="318" font-family="'SFMono-Regular','SF Mono','Menlo','Consolas','Liberation Mono','DejaVu Sans Mono',monospace" font-size="11.5" letter-spacing="1.5" fill="#3fb950" font-weight="bold">GBIF / DARWINCORE EXPORT</text>
  <text x="26" y="340" font-family="'SFMono-Regular','SF Mono','Menlo','Consolas','Liberation Mono','DejaVu Sans Mono',monospace" font-size="13.5" xml:space="preserve"><tspan fill="#00C853">$ </tspan><tspan fill="#e6edf3" font-weight="bold">seednap </tspan><tspan fill="#7ee787">format-gbif</tspan><tspan fill="#8b949e"> INPUT</tspan></text>
  <text x="430" y="340" font-family="'SFMono-Regular','SF Mono','Menlo','Consolas','Liberation Mono','DejaVu Sans Mono',monospace" font-size="13" fill="#6e7681" xml:space="preserve"># results to GBIF long format</text>
  <text x="26" y="363" font-family="'SFMono-Regular','SF Mono','Menlo','Consolas','Liberation Mono','DejaVu Sans Mono',monospace" font-size="13.5" xml:space="preserve"><tspan fill="#00C853">$ </tspan><tspan fill="#e6edf3" font-weight="bold">seednap </tspan><tspan fill="#7ee787">create-gbif</tspan><tspan fill="#8b949e"> TAXO ... OUTPUT</tspan></text>
  <text x="430" y="363" font-family="'SFMono-Regular','SF Mono','Menlo','Consolas','Liberation Mono','DejaVu Sans Mono',monospace" font-size="13" fill="#6e7681" xml:space="preserve"># build the DarwinCore occurrence CSV</text>
  <text x="26" y="386" font-family="'SFMono-Regular','SF Mono','Menlo','Consolas','Liberation Mono','DejaVu Sans Mono',monospace" font-size="13.5" xml:space="preserve"><tspan fill="#00C853">$ </tspan><tspan fill="#e6edf3" font-weight="bold">seednap </tspan><tspan fill="#7ee787">wis-metadata</tspan><tspan fill="#8b949e"> --marker M ...</tspan></text>
  <text x="430" y="386" font-family="'SFMono-Regular','SF Mono','Menlo','Consolas','Liberation Mono','DejaVu Sans Mono',monospace" font-size="13" fill="#6e7681" xml:space="preserve"># metadata CSVs from the WIS database</text>
  <text x="26" y="419" font-family="'SFMono-Regular','SF Mono','Menlo','Consolas','Liberation Mono','DejaVu Sans Mono',monospace" font-size="11.5" letter-spacing="1.5" fill="#3fb950" font-weight="bold">PREPARE DATA</text>
  <text x="26" y="441" font-family="'SFMono-Regular','SF Mono','Menlo','Consolas','Liberation Mono','DejaVu Sans Mono',monospace" font-size="13.5" xml:space="preserve"><tspan fill="#00C853">$ </tspan><tspan fill="#e6edf3" font-weight="bold">seednap </tspan><tspan fill="#7ee787">demultiplex</tspan><tspan fill="#8b949e"> READS LIB META</tspan></text>
  <text x="430" y="441" font-family="'SFMono-Regular','SF Mono','Menlo','Consolas','Liberation Mono','DejaVu Sans Mono',monospace" font-size="13" fill="#6e7681" xml:space="preserve"># split ligation-based libraries</text>
  <text x="26" y="464" font-family="'SFMono-Regular','SF Mono','Menlo','Consolas','Liberation Mono','DejaVu Sans Mono',monospace" font-size="13.5" xml:space="preserve"><tspan fill="#00C853">$ </tspan><tspan fill="#e6edf3" font-weight="bold">seednap </tspan><tspan fill="#7ee787">manifest</tspan><tspan fill="#8b949e"> FIELD_META</tspan></text>
  <text x="430" y="464" font-family="'SFMono-Regular','SF Mono','Menlo','Consolas','Liberation Mono','DejaVu Sans Mono',monospace" font-size="13" fill="#6e7681" xml:space="preserve"># build a FAIRe sample manifest</text>
  <text x="26" y="487" font-family="'SFMono-Regular','SF Mono','Menlo','Consolas','Liberation Mono','DejaVu Sans Mono',monospace" font-size="13.5" xml:space="preserve"><tspan fill="#00C853">$ </tspan><tspan fill="#e6edf3" font-weight="bold">seednap </tspan><tspan fill="#7ee787">clean</tspan><tspan fill="#8b949e"> ABUNDANCE ... OUTPUT</tspan></text>
  <text x="430" y="487" font-family="'SFMono-Regular','SF Mono','Menlo','Consolas','Liberation Mono','DejaVu Sans Mono',monospace" font-size="13" fill="#6e7681" xml:space="preserve"># decontaminate against controls</text>
  <text x="26" y="520" font-family="'SFMono-Regular','SF Mono','Menlo','Consolas','Liberation Mono','DejaVu Sans Mono',monospace" font-size="11.5" letter-spacing="1.5" fill="#3fb950" font-weight="bold">INSPECT A RUN</text>
  <text x="26" y="542" font-family="'SFMono-Regular','SF Mono','Menlo','Consolas','Liberation Mono','DejaVu Sans Mono',monospace" font-size="13.5" xml:space="preserve"><tspan fill="#00C853">$ </tspan><tspan fill="#e6edf3" font-weight="bold">seednap </tspan><tspan fill="#7ee787">report</tspan><tspan fill="#8b949e"> MARKER</tspan></text>
  <text x="430" y="542" font-family="'SFMono-Regular','SF Mono','Menlo','Consolas','Liberation Mono','DejaVu Sans Mono',monospace" font-size="13" fill="#6e7681" xml:space="preserve"># read-tracking report (--html)</text>
  <text x="26" y="565" font-family="'SFMono-Regular','SF Mono','Menlo','Consolas','Liberation Mono','DejaVu Sans Mono',monospace" font-size="13.5" xml:space="preserve"><tspan fill="#00C853">$ </tspan><tspan fill="#e6edf3" font-weight="bold">seednap </tspan><tspan fill="#7ee787">monitor</tspan><tspan fill="#8b949e"> MARKER</tspan></text>
  <text x="430" y="565" font-family="'SFMono-Regular','SF Mono','Menlo','Consolas','Liberation Mono','DejaVu Sans Mono',monospace" font-size="13" fill="#6e7681" xml:space="preserve"># summarise a run from its state</text>
  <text x="26" y="588" font-family="'SFMono-Regular','SF Mono','Menlo','Consolas','Liberation Mono','DejaVu Sans Mono',monospace" font-size="13.5" xml:space="preserve"><tspan fill="#00C853">$ </tspan><tspan fill="#e6edf3" font-weight="bold">seednap </tspan><tspan fill="#7ee787">explain</tspan><tspan fill="#8b949e"> [CODE]</tspan></text>
  <text x="430" y="588" font-family="'SFMono-Regular','SF Mono','Menlo','Consolas','Liberation Mono','DejaVu Sans Mono',monospace" font-size="13" fill="#6e7681" xml:space="preserve"># explain an error code</text>
  <text x="26" y="611" font-family="'SFMono-Regular','SF Mono','Menlo','Consolas','Liberation Mono','DejaVu Sans Mono',monospace" font-size="13.5" xml:space="preserve"><tspan fill="#00C853">$ </tspan><tspan fill="#e6edf3" font-weight="bold">seednap </tspan><tspan fill="#7ee787">version</tspan><tspan fill="#8b949e"></tspan></text>
  <text x="430" y="611" font-family="'SFMono-Regular','SF Mono','Menlo','Consolas','Liberation Mono','DejaVu Sans Mono',monospace" font-size="13" fill="#6e7681" xml:space="preserve"># installed version</text>
  <text x="26" y="640" font-family="'SFMono-Regular','SF Mono','Menlo','Consolas','Liberation Mono','DejaVu Sans Mono',monospace" font-size="13.5"><tspan fill="#00C853">$ </tspan></text>
  <rect x="41" y="628" width="8" height="15" rx="1" fill="#00C853" opacity="0.9"/>
</svg>
