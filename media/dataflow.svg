<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 564" width="100%" font-family="'SFMono-Regular','SF Mono','Menlo','Consolas','Liberation Mono','DejaVu Sans Mono',monospace">
  <rect x="0.5" y="0.5" width="859" height="563" rx="12" fill="#0D1117" stroke="#30363d" stroke-width="1"/>
  <text x="24" y="30" font-size="12.5" fill="#7d8590" letter-spacing="1">data flow</text>
  <rect x="40" y="64" width="400" height="46" rx="9" fill="#161B22" stroke="#30363d" stroke-width="1.6"/>
  <text x="240" y="84" text-anchor="middle" font-size="14" font-weight="bold" fill="#e6edf3">Raw paired-end FASTQ</text>
  <text x="240" y="101" text-anchor="middle" font-size="11.5" fill="#7ee787">R1 / R2</text>
  <rect x="40" y="152" width="400" height="46" rx="9" fill="#161B22" stroke="#00C853" stroke-width="1.6"/>
  <text x="240" y="172" text-anchor="middle" font-size="14" font-weight="bold" fill="#e6edf3">Trim</text>
  <text x="240" y="189" text-anchor="middle" font-size="11.5" fill="#7ee787">Cutadapt, 2-pass primer removal</text>
  <rect x="40" y="240" width="400" height="46" rx="9" fill="#161B22" stroke="#00C853" stroke-width="1.6"/>
  <text x="240" y="260" text-anchor="middle" font-size="14" font-weight="bold" fill="#e6edf3">Cluster</text>
  <text x="240" y="277" text-anchor="middle" font-size="11.5" fill="#7ee787">SWARM (OTUs)  or  DADA2 (ASVs)</text>
  <rect x="40" y="328" width="400" height="46" rx="9" fill="#161B22" stroke="#00C853" stroke-width="1.6"/>
  <text x="240" y="348" text-anchor="middle" font-size="14" font-weight="bold" fill="#e6edf3">Taxonomy</text>
  <text x="240" y="365" text-anchor="middle" font-size="11.5" fill="#7ee787">BLAST / DADA2 / DECIPHER / ecotag</text>
  <rect x="40" y="416" width="400" height="46" rx="9" fill="#161B22" stroke="#00C853" stroke-width="1.6"/>
  <text x="240" y="436" text-anchor="middle" font-size="14" font-weight="bold" fill="#e6edf3">Export</text>
  <text x="240" y="453" text-anchor="middle" font-size="11.5" fill="#7ee787">GBIF long format</text>
  <rect x="40" y="504" width="400" height="46" rx="9" fill="#161B22" stroke="#00C853" stroke-width="1.6"/>
  <text x="240" y="524" text-anchor="middle" font-size="14" font-weight="bold" fill="#e6edf3">Report</text>
  <text x="240" y="541" text-anchor="middle" font-size="11.5" fill="#7ee787">read tracking + HTML</text>
  <line x1="240" y1="110" x2="240" y2="145" stroke="#3fb950" stroke-width="1.6"/><path d="M 236 145 L 244 145 L 240 152 z" fill="#3fb950"/>
  <text x="464" y="144" font-size="11" fill="#6e7681" xml:space="preserve">+ demultiplex first if reads are multiplexed</text>
  <line x1="240" y1="198" x2="240" y2="233" stroke="#3fb950" stroke-width="1.6"/><path d="M 236 233 L 244 233 L 240 240 z" fill="#3fb950"/>
  <text x="464" y="217" font-size="12" fill="#8b949e" xml:space="preserve">trimmed FASTQ pairs</text>
  <line x1="240" y1="286" x2="240" y2="321" stroke="#3fb950" stroke-width="1.6"/><path d="M 236 321 L 244 321 L 240 328 z" fill="#3fb950"/>
  <text x="464" y="305" font-size="12" fill="#8b949e" xml:space="preserve">feature table + query.fasta</text>
  <line x1="240" y1="374" x2="240" y2="409" stroke="#3fb950" stroke-width="1.6"/><path d="M 236 409 L 244 409 L 240 416 z" fill="#3fb950"/>
  <text x="464" y="393" font-size="12" fill="#8b949e" xml:space="preserve">{marker}_{method}.csv</text>
  <text x="464" y="408" font-size="11" fill="#6e7681" xml:space="preserve">+ clean: decontaminate vs controls</text>
  <line x1="240" y1="462" x2="240" y2="497" stroke="#3fb950" stroke-width="1.6"/><path d="M 236 497 L 244 497 L 240 504 z" fill="#3fb950"/>
  <text x="464" y="481" font-size="12" fill="#8b949e" xml:space="preserve">{marker}_{method}_gbif.csv</text>
  <text x="464" y="496" font-size="11" fill="#6e7681" xml:space="preserve">+ darwincore: GBIF occurrence CSV</text>
