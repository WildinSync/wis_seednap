  <text x="820" y="188" text-anchor="end" font-size="12.5" fill="#e3b341">8</text>
  <text x="24" y="218" font-size="11" fill="#6e7681">each non-zero cell becomes one row (eventID = sample, nb_reads = count); zero cells are dropped</text>
