  <line x1="375" y1="120" x2="455" y2="120" stroke="#3fb950" stroke-width="1.8"/><path d="M 455 114 L 463 120 L 455 126 z" fill="#3fb950"/>
  <text x="415" y="108" text-anchor="middle" font-size="10.5" fill="#7d8590">melt</text>
  <text x="415" y="140" text-anchor="middle" font-size="10.5" fill="#7d8590">drop 0s</text>
  <text x="490" y="58" font-size="12" font-weight="bold" fill="#7ee787">long format (one row per observation)</text>
