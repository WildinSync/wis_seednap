  <text x="490" y="110" font-size="12.5" fill="#e6edf3">S1</text>
  <text x="610" y="110" font-size="12.5" fill="#e6edf3">OTU_1</text>
  <text x="820" y="110" text-anchor="end" font-size="12.5" fill="#e3b341">120</text>
